name: Feature request
description: Suggest a new sponsored surface or capability.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Search existing requests first so you don't file a duplicate.
  - type: textarea
    attributes:
      label: Feature description
      description: Describe the sponsored surface or capability. Add a screenshot of the ad if it is a new surface.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Motivation
      description: Why is this worth adding? What is the use case?
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched open and closed issues and this is not a duplicate.
          required: true
